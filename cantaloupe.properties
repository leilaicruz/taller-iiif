###########################################################################
# Cantaloupe configuration file
# https://cantaloupe-project.github.io/manual/5.0/configuration.html
###########################################################################

# ---- Network ----
http.enabled = true
http.host = 0.0.0.0
http.port = 8182

https.enabled = false

# ---- Base URI ----
# base_uri = http://localhost:8182

# ---- Endpoints ----
endpoint.iiif.1.enabled = false
endpoint.iiif.2.enabled = true
endpoint.iiif.3.enabled = true
endpoint.api.enabled = true
endpoint.api.username = admin
endpoint.api.secret = changeme

endpoint.admin.enabled = true
endpoint.admin.username = admin
endpoint.admin.secret = changeme

# ---- Sources ----
source.static = FilesystemSource

# ---- FilesystemSource ----
FilesystemSource.BasicLookupStrategy.path_prefix = /var/cantaloupe/images/

# ---- Processors ----
processor.selection_strategy = AutomaticSelectionStrategy

# ---- Caching ----
cache.server.source = FilesystemCache
cache.server.source.ttl_seconds = 2592000
cache.server.derivative = FilesystemCache
cache.server.derivative.ttl_seconds = 2592000
cache.server.info.enabled = true

# ---- FilesystemCache ----
FilesystemCache.pathname = /var/cantaloupe/cache

# ---- Logging ----
log.application.level = info
log.application.ConsoleAppender.enabled = true
log.access.ConsoleAppender.enabled = true

# ---- Overlays ----
overlays.enabled = false

# ---- Redactions ----
redaction.enabled = false

# ---- Metadata ----
metadata.preserve = true
metadata.respect_orientation = true
