server {
    listen 80 default_server;
    server_name _;

    # ── Taller (workshop) ──
    root /var/www/taller;
    index index.html;

    location / {
        try_files $uri $uri/ =404;
    }

    # ── Serve manifests with proper IIIF content type ──
    location /manifests/ {
        alias /var/www/taller/manifests/;
        add_header Access-Control-Allow-Origin *;
        add_header Content-Type application/ld+json;
    }

    # ── Manifest Editor (Digirati) ──
    location /editor/ {
        alias /var/www/editor/;
        try_files $uri $uri/ /editor/index.html;
    }

    # ── Proxy IIIF requests to Cantaloupe ──
    location /iiif/ {
        proxy_pass http://127.0.0.1:8182/iiif/;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $http_host;
        proxy_read_timeout 300s;
        proxy_buffering off;
        add_header Access-Control-Allow-Origin *;
    }

    # ── Proxy admin panel ──
    location /admin {
        proxy_pass http://127.0.0.1:8182/admin;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Host $http_host;
    }

    # ── Gzip ──
    gzip on;
    gzip_types text/plain text/css application/json application/javascript application/ld+json;
    gzip_min_length 256;
}
