<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IIIF Viewer - Cantaloupe</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #1a1a1a; color: #fff; }
        header { padding: 12px 20px; background: #2a2a2a; display: flex; align-items: center; gap: 12px; }
        header h1 { font-size: 18px; }
        #image-select { padding: 6px 10px; border-radius: 4px; border: 1px solid #555; background: #333; color: #fff; }
        #viewer { width: 100%; height: calc(100vh - 48px); }
    </style>
</head>
<body>

<header>
    <h1>IIIF Viewer</h1>
    <label for="image-select">Imagen:</label>
    <select id="image-select">
        <option value="1.jpg">1.jpg</option>
        <option value="2.jpg">2.jpg</option>
        <option value="3.jpg">3.jpg</option>
        <option value="4.jpg">4.jpg</option>
        <option value="5.jpg">5.jpg</option>
        <option value="6.jpg">6.jpg</option>
        <option value="7.jpg">7.jpg</option>
        <option value="8.jpg">8.jpg</option>
        <option value="9.jpg">9.jpg</option>
        <option value="10.jpg">10.jpg</option>
    </select>
</header>

<div id="viewer"></div>

<script src="https://cdn.jsdelivr.net/npm/openseadragon@4.1/build/openseadragon/openseadragon.min.js"></script>
<script>
    const IIIF_BASE = 'http://localhost:8182/iiif/3';

    const viewer = OpenSeadragon({
        id: 'viewer',
        prefixUrl: 'https://cdn.jsdelivr.net/npm/openseadragon@4.1/build/openseadragon/images/',
        tileSources: `${IIIF_BASE}/1.jpg/info.json`,
        showNavigator: true,
        navigatorPosition: 'BOTTOM_RIGHT',
        showRotationControl: true,
        showFlipControl: true,
        gestureSettingsMouse: { scrollToZoom: true },
        gestureSettingsTouch: { pinchToZoom: true },
        minZoomLevel: 0.5,
        maxZoomLevel: 20,
        animationTime: 0.3,
    });

    document.getElementById('image-select').addEventListener('change', function () {
        viewer.open(`${IIIF_BASE}/${this.value}/info.json`);
    });
</script>

</body>
</html>
